<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 &mdash; P&aacute;gina no encontrada | WebForge</title>
    <meta name="description" content="La pagina que buscas no existe. Volv&eacute; al inicio de WebForge para encontrar el contenido que necesit&aacute;s.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0d1117">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* === Self-contained 404 — No external CSS dependencies === */

        /* --- Design Tokens --- */
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-elevated: #2d333b;

            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --text-inverse: #0d1117;

            --accent-blue: #58a6ff;
            --accent-cyan: #39d2c0;
            --accent-red: #ff6b6b;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-orange: #f0883e;

            --border-color: #30363d;
            --grid-color: rgba(88, 166, 255, 0.04);
            --grid-size: 40px;

            --shadow-glow-blue: 0 0 20px rgba(88, 166, 255, 0.15);

            --code-keyword: #ff7b72;
            --code-string: #a5d6ff;
            --code-function: #d2a8ff;
            --code-property: #79c0ff;

            --font-heading: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
            --font-body: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --font-code: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-md: 1.125rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 1.5rem;
            --font-size-2xl: 2rem;
            --font-size-3xl: 2.5rem;

            --font-weight-regular: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;

            --line-height-relaxed: 1.8;

            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;

            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;

            --transition-fast: 150ms ease;
            --z-grid: -1;
        }

        /* --- Minimal Reset --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Body & Grid Background --- */
        body {
            font-family: var(--font-body);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-regular);
            color: var(--text-primary);
            background-color: var(--bg-primary);
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
            z-index: var(--z-grid);
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        * { scrollbar-width: thin; scrollbar-color: var(--border-color) var(--bg-primary); }

        /* --- Focus --- */
        :focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        /* --- Selection --- */
        ::selection {
            background-color: var(--accent-blue);
            color: var(--text-inverse);
        }

        /* --- Button Component --- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-6);
            font-family: var(--font-heading);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            line-height: 1;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: var(--text-inverse);
            border-color: var(--accent-blue);
        }

        .btn-primary:hover {
            background-color: #4a96e8;
            box-shadow: var(--shadow-glow-blue);
            transform: translateY(-1px);
        }

        /* === 404 Page Specific === */
        .error-404 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: var(--space-8) var(--space-4);
            animation: fade-in 0.4s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .error-404 { animation: none; }
            .error-404__code { animation: none; }
            .error-404__cursor { animation: none; }
        }

        .error-404__code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-2);
            animation: error-pulse 3s ease-in-out infinite;
        }

        @keyframes error-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .error-404__message {
            font-family: var(--font-heading);
            font-size: var(--font-size-2xl);
            color: var(--text-primary);
            margin-bottom: var(--space-3);
        }

        .error-404__desc {
            font-size: var(--font-size-md);
            color: var(--text-secondary);
            max-width: 480px;
            line-height: var(--line-height-relaxed);
            margin-bottom: var(--space-6);
        }

        /* Search box */
        .error-404__search {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin-bottom: var(--space-8);
        }

        .error-404__search input {
            width: 100%;
            padding: var(--space-3) var(--space-4) var(--space-3) var(--space-10);
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: var(--font-size-sm);
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .error-404__search input::placeholder {
            color: var(--text-muted);
        }

        .error-404__search input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px var(--accent-blue), 0 0 0 4px rgba(88, 166, 255, 0.15);
        }

        .error-404__search-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .error-404__search-hint {
            margin-top: var(--space-2);
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        .error-404__search-hint kbd {
            display: inline-block;
            padding: 0 0.35em;
            font-family: var(--font-code);
            font-size: var(--font-size-xs);
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
        }

        /* Quick links grid */
        .error-404__links-title {
            font-family: var(--font-heading);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: var(--space-4);
        }

        .error-404__links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-3);
            max-width: 640px;
            width: 100%;
            margin-bottom: var(--space-8);
        }

        .error-404__link {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            transition: border-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }

        .error-404__link:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .error-404__link svg {
            flex-shrink: 0;
            opacity: 0.6;
        }

        .error-404__link:hover svg {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .error-404__links {
                grid-template-columns: repeat(2, 1fr);
            }

            .error-404__search {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <main class="error-404" id="main-content">
        <div class="error-404__code">404</div>

        <h1 class="error-404__message">P&aacute;gina no encontrada</h1>
        <p class="error-404__desc">
            La ruta que busc&aacute;s no existe o fue movida.
            Us&aacute; el buscador o prob&aacute; con alguno de estos enlaces.
        </p>

        <!-- Search -->
        <div class="error-404__search">
            <svg class="error-404__search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="error-search" placeholder="Buscar en WebForge..." autocomplete="off">
        </div>

        <!-- Popular links -->
        <p class="error-404__links-title">Secciones populares</p>
        <div class="error-404__links">
            <a href="/" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Inicio
            </a>
            <a href="/sections/html-basico.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                HTML
            </a>
            <a href="/sections/css-basico.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
                CSS
            </a>
            <a href="/sections/js-basico.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                JavaScript
            </a>
            <a href="/sections/git-github.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m18.07-5.07-4.24 4.24M9.17 9.17 4.93 4.93m14.14 14.14-4.24-4.24M9.17 14.83l-4.24 4.24"/></svg>
                Git &amp; GitHub
            </a>
            <a href="/cheatsheets/html-cheatsheet.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                Cheatsheets
            </a>
            <a href="/sections/css-flexbox.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                Flexbox
            </a>
            <a href="/sections/css-grid.html" class="error-404__link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                CSS Grid
            </a>
        </div>

        <a href="/" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Volver al inicio
        </a>
    </main>

    <script>
        // Search: redirect to home with query in URL hash
        const searchInput = document.getElementById('error-search');
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
                // Redirect to home page — search will pick up from there
                window.location.href = '/#search=' + encodeURIComponent(searchInput.value.trim());
            }
        });

        // Focus search on "/" key
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Auto-focus search input
        searchInput.focus();
    </script>

</body>
</html>
